<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: #fcfaf6;
      color: #333333;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    h2 {
      margin: 0 0 4px 0;
      color: #d32f2f;
      font-size: 16px;
      font-weight: 600;
    }
    p {
      margin: 0;
      font-size: 12px;
      color: #666666;
      line-height: 1.4;
    }
    .drop-zone {
      border: 2px dashed #d32f2f;
      border-radius: 8px;
      padding: 24px 16px;
      text-align: center;
      background-color: #ffffff;
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s;
    }
    .drop-zone.hover {
      background-color: #ffebee;
      border-color: #b71c1c;
    }
    .drop-zone svg {
      width: 32px;
      height: 32px;
      fill: #d32f2f;
      margin-bottom: 8px;
    }
    .drop-zone span {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #d32f2f;
    }
    .drop-zone small {
      display: block;
      margin-top: 4px;
      font-size: 10px;
      color: #999999;
    }
    .file-list {
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      background-color: #ffffff;
      padding: 4px;
      font-size: 11px;
    }
    .file-item {
      padding: 4px 8px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #f5f5f5;
    }
    .file-item:last-child {
      border-bottom: none;
    }
    .btn-generate {
      background-color: #d32f2f;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      width: 100%;
    }
    .btn-generate:hover {
      background-color: #b71c1c;
    }
    .btn-generate:disabled {
      background-color: #cccccc;
      color: #999999;
      cursor: not-allowed;
    }
    #file-input {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>สร้าง Flowchart ระบบเจ๊น้อยใน Figma</h2>
    <p>เลือกไฟล์ภาพหน้าจอที่รันจากสคริปต์ Playwright ทั้ง 14 ไฟล์ จากโฟลเดอร์ <code>storefront-ux-flow</code> เพื่อนำไปเรียงลำดับเป็นแผนภาพพรีเซนเทชันสวยงามอัตโนมัติ</p>
    
    <label for="file-input" class="drop-zone" id="drop-zone">
      <svg viewBox="0 0 24 24">
        <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
      </svg>
      <span>คลิกหรือลากไฟล์ภาพสกรีนช็อตมาวางที่นี่</span>
      <small>รองรับไฟล์ .png ทั้ง 14 หน้า</small>
    </label>
    <input type="file" id="file-input" multiple accept="image/png">
    
    <div class="file-list" id="file-list" style="display: none;"></div>
    
    <button class="btn-generate" id="btn-generate" disabled>วาดแผนภาพลง Figma Canvas</button>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const fileList = document.getElementById('file-list');
    const btnGenerate = document.getElementById('btn-generate');
    let loadedFiles = [];

    // Drag and drop handlers
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('hover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('hover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('hover');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => {
      handleFiles(fileInput.files);
    });

    function handleFiles(files) {
      const fileArray = Array.from(files).filter(file => file.type === 'image/png');
      if (fileArray.length === 0) return;

      loadedFiles = [...loadedFiles, ...fileArray];
      
      // เรียงลำดับไฟล์ตามตัวเลขนำหน้าเพื่อให้ลำดับ flowchart ถูกต้อง
      loadedFiles.sort((a, b) => {
        const numA = parseInt(a.name) || 0;
        const numB = parseInt(b.name) || 0;
        return numA - numB;
      });

      updateFileList();
    }

    function updateFileList() {
      fileList.innerHTML = '';
      if (loadedFiles.length > 0) {
        fileList.style.display = 'block';
        loadedFiles.forEach(file => {
          const item = document.createElement('div');
          item.className = 'file-item';
          item.innerHTML = `<span>${file.name}</span><strong>${(file.size / 1024).toFixed(0)} KB</strong>`;
          fileList.appendChild(item);
        });
        btnGenerate.disabled = false;
      } else {
        fileList.style.display = 'none';
        btnGenerate.disabled = true;
      }
    }

    btnGenerate.addEventListener('click', async () => {
      btnGenerate.disabled = true;
      btnGenerate.innerText = 'กำลังประมวลผล...';
      
      const imagesData = [];
      
      for (const file of loadedFiles) {
        const arrayBuffer = await file.arrayBuffer();
        imagesData.push({
          name: file.name,
          bytes: new Uint8Array(arrayBuffer)
        });
      }

      parent.postMessage({
        pluginMessage: {
          type: 'create-flowchart',
          images: imagesData
        }
      }, '*');
    });

    // Handle feedback or completion messages from the main thread
    window.onmessage = (event) => {
      const message = event.data.pluginMessage;
      if (message && message.type === 'success') {
        btnGenerate.innerText = 'วาดเสร็จเรียบร้อย!';
        setTimeout(() => {
          btnGenerate.innerText = 'วาดแผนภาพลง Figma Canvas';
          btnGenerate.disabled = false;
        }, 2000);
      }
    };
  </script>
</body>
</html>
